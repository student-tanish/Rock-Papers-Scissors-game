<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1 class="heading">Rock Paper Scissors</h1>
        <div id="container">
            <div class="left box">
                <div class="symbols lSymbols">
                    <button class = "leftBtn btn"><img src="assets/rock.png" alt="Rock"></button>
                    <button class = "leftBtn btn"><img src="assets/paper.png" alt="Paper"></button>
                    <button class = "leftBtn btn"><img src="assets/scissors.png" alt="Scissors"></button>
                </div>
            </div>
            <div class="right box">
                <div class="symbols rSymbols">
                    <button class="rightBtn btn"><img src="assets/rock.png" alt="Rock"></button>
                    <button class="rightBtn btn"><img src="assets/paper.png" alt="Paper"></button>
                    <button class="rightBtn btn"><img src="assets/scissors.png" alt="Scissors"></button>
                </div>
            </div>
        </div>
        <div class="score">
            <div class="myScore">You : 0</div>
            <div class="compScore">Computer : 0</div>
        </div>
        <div class="winOrLose">Let's play!</div>
        <button class="restart">Restart</button>
    </main>
    <script src="script.js"></script>
</body>
</html>
